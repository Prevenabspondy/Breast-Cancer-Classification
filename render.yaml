services:
  - type: web
    name: breast-cancer-classification
    env: python
    plan: free

    buildCommand: |
      pip install --upgrade pip
      pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
      pip install -r requirements.txt

    startCommand: python app.py

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
